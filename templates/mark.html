<!DOCTYPE html>
<html>
<head>
<title>Mark Attendance</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
}

input{
width:90%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
background:#00c6ff;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0072ff;
}

.popup{
margin-top:20px;
background:#00c851;
padding:10px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Mark Attendance</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="subject" placeholder="Enter Subject" required>

<br>

<button type="submit">Start Camera</button>

</form>

{% if message %}

<div class="popup">
{{message}}
</div>

{% endif %}

</div>

</body>
</html>
