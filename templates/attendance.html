<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>

<style>

body{
font-family:Arial;
background:#141e30;
color:white;
margin:0;
padding:40px;
}

h2{
text-align:center;
margin-bottom:40px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:#1f2a40;
}

th,td{
padding:15px;
text-align:center;
}

th{
background:#00c6ff;
}

tr:nth-child(even){
background:#243b55;
}

a{
display:block;
margin-top:30px;
text-align:center;
color:#00c6ff;
text-decoration:none;
}

</style>

</head>

<body>

<h2>Attendance Records</h2>

<table>

<tr>
<th>Student</th>
<th>Subject</th>
<th>Date</th>
</tr>

{% for a in attendance %}

<tr>
<td>{{a.student.name}}</td>
<td>{{a.subject}}</td>
<td>{{a.date}}</td>
</tr>

{% endfor %}

</table>

<a href="/">Back to Dashboard</a>

</body>
</html>
